<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="auto">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2980" />
      <stop offset="100%" stop-color="#26D0CE" />
      <animate attributeName="x1" values="0%;100%;0%" dur="10s" repeatCount="indefinite" />
      <animate attributeName="y1" values="0%;100%;0%" dur="10s" repeatCount="indefinite" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-gradient)" rx="15" ry="15" />
  
  <text x="50%" y="40%" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    Awesome HHH Framework
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite" />
  </text>
  
  <text x="50%" y="65%" font-family="Arial, sans-serif" font-size="28" font-weight="normal" fill="#e0e0e0" text-anchor="middle">
    Helpfulness • Harmlessness • Honesty
  </text>
  
  <text x="50%" y="85%" font-family="Arial, sans-serif" font-size="20" font-style="italic" fill="#c0c0c0" text-anchor="middle">
    The 3Es of AI Alignment
  </text>
  
  <!-- Animated particles -->
  <circle cx="10%" cy="80%" r="5" fill="#fff" opacity="0.6">
    <animate attributeName="cy" values="80%;20%;80%" dur="7s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="7s" repeatCount="indefinite" />
  </circle>
  <circle cx="90%" cy="30%" r="8" fill="#fff" opacity="0.6">
    <animate attributeName="cy" values="30%;80%;30%" dur="9s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="9s" repeatCount="indefinite" />
  </circle>
  <circle cx="20%" cy="40%" r="3" fill="#fff" opacity="0.8">
    <animate attributeName="cx" values="20%;80%;20%" dur="12s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;1;0.3" dur="12s" repeatCount="indefinite" />
  </circle>
</svg>
